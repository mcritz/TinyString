name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (build, test)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      # `swift test` has been an unreliable SIGSEGV on macos-15's runner across several
      # toolchains (see git history); trying the newer macos-26 image + newest Xcode as an
      # attempt to dodge that runner-specific crash rather than a language-feature requirement
      # (6.2+ has been enough since InlineArray/Span/typed-throws/integer generics arrived).
      - run: sudo xcode-select -s /Applications/Xcode_26.6.app
      - run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

  linux:
    name: Linux (build, test)
    runs-on: ubuntu-latest
    container: swift:6.3.3
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  wasm:
    name: WebAssembly (Embedded + standard, compile check)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Must match (or exceed) the wasm SDK bundle's own version below - a lower host
      # toolchain can't resolve its swift-sdk.json metadata.
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.3"
      - run: swift --version

      # Bundle provides both swift-6.3.3-RELEASE_wasm and swift-6.3.3-RELEASE_wasm-embedded.
      # Checksum computed locally via `swift package compute-checksum` against the same
      # download - not copied from a doc page, which tracks the latest release, not 6.3.3.
      - name: Install Wasm Swift SDK
        run: >
          swift sdk install
          https://download.swift.org/swift-6.3.3-release/wasm-sdk/swift-6.3.3-RELEASE/swift-6.3.3-RELEASE_wasm.artifactbundle.tar.gz
          --checksum cabfa08b73bb8ac783927ecd15fa386e99d0c139c5f232445067bcf58379cae7

      - name: Build Embedded Wasm smoke test
        run: swift build --product TinyStringEmbeddedSmokeTest --swift-sdk swift-6.3.3-RELEASE_wasm-embedded --build-path .build-wasm-embedded

      - name: Build standard Wasm
        run: swift build --swift-sdk swift-6.3.3-RELEASE_wasm --build-path .build-wasm
